<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Website</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <span id="top"></span>
    <!-- Navigation Bar -->
    <nav>
        <div class="logo">MyWebsite</div>
        <ul>
            <li><a href="#home">Home</a></li>
            <li><a href="#about">About</a></li>
            <li><a href="#feedback">Feedback</a></li>
        </ul>

         <!-- Dark Mode Toggle -->
        <button id="dark-mode-toggle" title="Toggle Dark Mode">🌙</button>

    </nav>

    <!-- Home Section -->
    <section id="home">
        <h1>Welcome to My Website</h1>
        <p>This is my first webpage — built and deployed by me!</p>
    </section>

    <!-- About Section -->
    <section id="about">
        <h2>About</h2>
        <p>I am learning web development, Git, and cloud deployment.
           This site is a work in progress!</p>
    </section>

    <!-- Feedback Section -->
    <section id="feedback">
        <h2>Leave Feedback</h2>
        <form>
            <input type="text" placeholder="Your Name" />
            <input type="email" placeholder="Your Email" />
            <textarea placeholder="Your feedback here..."></textarea>
            <button type="submit">Send Feedback</button>
        </form>
    </section>

    <!-- Footer -->
    <footer>
        <p>Built with HTML & CSS | Hosted on GitHub</p>
    </footer>

    <!-- NEW BACK TO TOP BUTTON -->
    <a href="#top" id="back-to-top" title="Back to Top">↑</a>

    <script src="script.js"></script>
</body>
</html>
